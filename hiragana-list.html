<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hiragana Master - Hiragana List</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/kanji-list.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
<script src="assets/js/theme.js"></script></head>

<body class="kanji-list-page">
    <div class="bg-elements" aria-hidden="true">
        <span class="float-kana" style="--fk-top: 10%; --fk-left: 4%;  --fk-size: 4.5rem; --fk-dur: 26s;">あ</span>
        <span class="float-kana" style="--fk-top: 65%; --fk-left: 2%;  --fk-size: 3rem;   --fk-dur: 21s; --fk-delay: -8s;">ぬ</span>
        <span class="float-kana" style="--fk-top: 22%; --fk-left: 88%; --fk-size: 3.6rem; --fk-dur: 24s; --fk-delay: -14s;">お</span>
        <span class="float-kana" style="--fk-top: 75%; --fk-left: 91%; --fk-size: 5rem;   --fk-dur: 30s; --fk-delay: -5s;">は</span>
        <span class="float-kana" style="--fk-top: 44%; --fk-left: 93%; --fk-size: 2.6rem; --fk-dur: 19s; --fk-delay: -11s;">き</span>
        <span class="float-kana" style="--fk-top: 87%; --fk-left: 45%; --fk-size: 3.2rem; --fk-dur: 27s; --fk-delay: -17s;">み</span>
    </div>

    <main>
        <div class="header" style="position: relative; padding-bottom: 20px;">
            <a href="hiragana.html" class="back-button">← Back</a>
            <h1 class="title">Hiragana List</h1>
            <div class="subtitle">All Hiragana Characters</div>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search Romaji or Japanese...">
                <button id="clearSearchBtn" class="clear-search-btn" aria-label="Clear Search">✕</button>
            </div>
        </div>

        <div class="content">
            <div id="hiragana-list-container">
                <!-- Hiragana list will be populated here by JavaScript -->
            </div>
        </div>
    </main>

    <script>
        window.KANA_LIST_CONFIG = {
            containerId: 'hiragana-list-container',
            dataUrl: 'assets/data/hiragana.json',
            typeName: 'Hiragana'
        };
    </script>
    <script src="assets/js/kana-list.js"></script>
    <button id="scrollToTopBtn" title="Go to top">↑</button>
</body>

<footer class="main-footer">
    <div class="footer-content">
        <p>Made with <span class="heart">♥</span> by <span class="author">Ramadhan</span></p>
    </div>
</footer>

</html>
