<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab List - Japanese Master</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/vocab-list.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="assets/js/theme.js"></script>
</head>

<body>
    <div class="bg-elements" aria-hidden="true">
        <span class="float-kana" style="--fk-top: 12%; --fk-left: 5%;  --fk-size: 4.5rem; --fk-dur: 26s;">語</span>
        <span class="float-kana" style="--fk-top: 68%; --fk-left: 3%;  --fk-size: 3rem;   --fk-dur: 21s; --fk-delay: -8s;">彙</span>
        <span class="float-kana" style="--fk-top: 20%; --fk-left: 88%; --fk-size: 3.6rem; --fk-dur: 24s; --fk-delay: -14s;">言</span>
        <span class="float-kana" style="--fk-top: 76%; --fk-left: 90%; --fk-size: 5rem;   --fk-dur: 30s; --fk-delay: -5s;">葉</span>
        <span class="float-kana" style="--fk-top: 45%; --fk-left: 94%; --fk-size: 2.6rem; --fk-dur: 19s; --fk-delay: -11s;">話</span>
        <span class="float-kana" style="--fk-top: 88%; --fk-left: 46%; --fk-size: 3.2rem; --fk-dur: 27s; --fk-delay: -17s;">詞</span>
    </div>

    <div class="vl-page">

        <!-- Page header -->
        <div class="vl-page-header">
            <a href="index.html" class="vl-back-link">← Main Menu</a>
            <h1 class="title" style="margin-bottom: 4px;">Vocab List</h1>
            <p class="subtitle">
                Example words grouped by kanji —
                <span id="total-badge">—</span> cards total
            </p>
        </div>

        <!-- Sticky controls -->
        <div class="vl-controls">

            <!-- Level tabs -->
            <div class="level-tabs">
                <button class="level-tab" data-level="n5">N5</button>
                <button class="level-tab" data-level="n4">N4</button>
                <button class="level-tab" data-level="n3">N3</button>
                <button class="level-tab" data-level="n2">N2</button>
            </div>

            <!-- Search bar -->
            <div class="vl-search-row">
                <div class="vl-search-wrap">
                    <span class="vl-search-icon">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                    </span>
                    <input type="search" id="search-input" class="vl-search-input"
                           placeholder="Cari kanji atau kata…" autocomplete="off" spellcheck="false">
                    <button id="search-clear" class="vl-search-clear" aria-label="Hapus pencarian">✕</button>
                </div>
            </div>

            <!-- Group filter + global practice button -->
            <div class="vl-filter-row">
                <button id="chips-toggle" class="vl-chips-toggle" aria-expanded="false">
                    <span id="chips-toggle-label">Semua Grup</span>
                    <span class="vl-toggle-arrow">▾</span>
                </button>
                <div id="chips-panel" class="vl-chips-panel">
                    <div id="group-container" class="group-chips">
                        <span class="loading-chips">Loading…</span>
                    </div>
                </div>
                <a id="practice-link" href="vocab-flashcard.html" class="vl-practice-link">
                    Practice ›
                </a>
            </div>

        </div>

        <!-- List content (populated by JS) -->
        <div id="list-content">
            <p class="vl-loading">Loading vocabulary…</p>
        </div>

    </div>

    <footer class="main-footer">
        <div class="footer-content">
            <p>Made with <span class="heart">♥</span> by <span class="author">Ramadhan</span></p>
        </div>
    </footer>

    <button id="scrollToTopBtn" title="Back to top">↑</button>

    <script>
        // Scroll-to-top button visibility
        const scrollBtn = document.getElementById('scrollToTopBtn');
        window.addEventListener('scroll', () => {
            scrollBtn.classList.toggle('visible', window.scrollY > 300);
        }, { passive: true });
        scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    </script>

    <script src="assets/js/vocab-data.js"></script>
    <script src="assets/js/vocab-list.js"></script>
</body>

</html>
