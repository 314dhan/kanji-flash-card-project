<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab List - Japanese Master</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/vocab-list.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="assets/js/theme.js"></script>
</head>

<body>
    <div class="bg-elements"></div>

    <div class="vl-page">

        <!-- Page header -->
        <div class="vl-page-header">
            <a href="index.html" class="vl-back-link">← Main Menu</a>
            <h1 class="title" style="margin-bottom: 4px;">Vocab List</h1>
            <p class="subtitle">
                Example words grouped by kanji —
                <span id="total-badge">—</span> cards total
            </p>
        </div>

        <!-- Sticky controls -->
        <div class="vl-controls">

            <!-- Level tabs -->
            <div class="level-tabs">
                <button class="level-tab" data-level="n5">N5</button>
                <button class="level-tab" data-level="n4">N4</button>
                <button class="level-tab" data-level="n3">N3</button>
                <button class="level-tab" data-level="n2">N2</button>
            </div>

            <!-- Group filter + global practice button -->
            <div class="vl-filter-row">
                <div id="group-container" class="group-chips">
                    <span class="loading-chips">Loading…</span>
                </div>
                <a id="practice-link" href="vocab-flashcard.html" class="vl-practice-link">
                    Practice ›
                </a>
            </div>

        </div>

        <!-- List content (populated by JS) -->
        <div id="list-content">
            <p class="vl-loading">Loading vocabulary…</p>
        </div>

    </div>

    <footer class="main-footer">
        <div class="footer-content">
            <p>Made with <span class="heart">♥</span> by <span class="author">Ramadhan</span></p>
        </div>
    </footer>

    <button id="scrollToTopBtn" title="Back to top">↑</button>

    <script>
        // Scroll-to-top button visibility
        const scrollBtn = document.getElementById('scrollToTopBtn');
        window.addEventListener('scroll', () => {
            scrollBtn.classList.toggle('visible', window.scrollY > 300);
        }, { passive: true });
        scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    </script>

    <script src="assets/js/vocab-data.js"></script>
    <script src="assets/js/vocab-list.js"></script>
</body>

</html>
