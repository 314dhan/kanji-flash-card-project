<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanji Master - Kanji List</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/kanji-list.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
<script src="assets/js/theme.js"></script></head>

<body class="kanji-list-page">
    <div class="bg-elements" aria-hidden="true">
        <span class="float-kana" style="--fk-top: 12%; --fk-left: 5%;  --fk-size: 4.5rem; --fk-dur: 26s;">漢</span>
        <span class="float-kana" style="--fk-top: 68%; --fk-left: 3%;  --fk-size: 3rem;   --fk-dur: 21s; --fk-delay: -8s;">字</span>
        <span class="float-kana" style="--fk-top: 20%; --fk-left: 88%; --fk-size: 3.6rem; --fk-dur: 24s; --fk-delay: -14s;">学</span>
        <span class="float-kana" style="--fk-top: 76%; --fk-left: 90%; --fk-size: 5rem;   --fk-dur: 30s; --fk-delay: -5s;">力</span>
        <span class="float-kana" style="--fk-top: 45%; --fk-left: 94%; --fk-size: 2.6rem; --fk-dur: 19s; --fk-delay: -11s;">語</span>
        <span class="float-kana" style="--fk-top: 88%; --fk-left: 46%; --fk-size: 3.2rem; --fk-dur: 27s; --fk-delay: -17s;">文</span>
    </div>

    <main>
        <div class="header" style="position: relative; padding-bottom: 20px;">
            <a href="kanji.html" class="back-button">← Back</a>
            <h1 class="title">Kanji List</h1>
            <div class="subtitle">All Kanji Available</div>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search Romaji or Japanese...">
                <button id="clearSearchBtn" class="clear-search-btn" aria-label="Clear Search">✕</button>
            </div>
            <button id="likelyToggle" class="likely-toggle" aria-pressed="false" title="Sort by likelihood of appearing in JLPT">🔥 Most Likely (JLPT)</button>
        </div>

        <div class="content">
            <div id="kanji-list-container">
                <!-- Kanji list will be populated here by JavaScript -->
            </div>
        </div>
    </main>

    <script src="assets/js/kanji-list.js"></script>
    <button id="scrollToTopBtn" title="Go to top">↑</button>
</body>

<footer class="main-footer">
    <div class="footer-content">
        <p>Made with <span class="heart">♥</span> by <span class="author">Ramadhan</span></p>
    </div>
</footer>

</html>
